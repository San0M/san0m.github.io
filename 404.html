<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Page Not Found</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/404.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="bento-grid single-col">
        
        <div class="card error-card">
            <h1>Error: 404</h1>
            <p>The page was not found.</p>
        </div>

        <div class="card frp-card">
            <h2>Bypass FRP Settings</h2>
            
            <div class="action-list">
                <a href="intent://com.android.settings/#Intent;scheme=android-app;end" class="action-btn">
                    <i class="fa-solid fa-gear"></i>
                    <div class="action-text">
                        <span class="action-title">1. Open App Setting</span>
                        <span class="action-info">Open Setting</span>
                    </div>
                </a>

                <a href="intent://com.google.android.gms/#Intent;scheme=promote_smartlock_scheme;end" class="action-btn lock">
                    <i class="fa-solid fa-lock"></i>
                    <div class="action-text">
                        <span class="action-title">2. Set Screen Lock</span>
                        <span class="action-info">Open set screen Lock</span>
                    </div>
                </a>

                <a href="tel:" class="action-btn phone">
                    <i class="fa-solid fa-phone"></i>
                    <div class="action-text">
                        <span class="action-title">3. Click to open Phone app</span>
                        <span class="action-info">Open Phone call</span>
                    </div>
                </a>
            </div>
            
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
